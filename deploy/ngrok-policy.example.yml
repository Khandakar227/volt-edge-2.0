on_http_request:
  - actions:
      - type: oauth
        config:
          provider: google

  # Replace example.com with your email domain, or replace the whole expression
  # with an exact email allow-list before using this on a real endpoint.
  - expressions:
      - "!actions.ngrok.oauth.identity.email.endsWith('@example.com')"
    actions:
      - type: deny
